<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Carrinho | TechStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display: block;">
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Tech<span>Store</span></a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="/admin/dashboard.html" class="nav-admin">Admin</a></li>
                </ul>
            </nav>
            <div class="cart-link"><a href="carrinho.html"><span>🛒</span> Carrinho</a></div>
        </div>
    </header>

    <main class="container">
        <h1 class="section-title">🛒 Seu <span>Carrinho</span></h1>
        
        <!-- Lista de Itens do Carrinho -->
        <div id="cart-container" class="cart-list">
            <p id="empty-msg" style="color: #64748b; text-align: center; width: 100%;">Carregando seu carrinho...</p>
        </div>

        <div id="cart-summary" class="cart-summary-box" style="display: none;">
            <h2>Total do Pedido</h2>
            <div class="total-val" id="cart-total">R$ 0,00</div>
            <br><br>
            <div style="display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;">
                <button class="btn-checkout" onclick="checkout()">Finalizar Compra</button>
                <button class="btn-clear" onclick="clearCart()">Esvaziar Carrinho</button>
            </div>
        </div>
    </main>

    <footer style="padding: 4rem 0; background: white; border-top: 1px solid #e2e8f0; text-align: center; margin-top: 5rem;">
        <div class="container">
            <div class="logo" style="margin-bottom: 1rem;">Tech<span>Store</span></div>
            <p style="color: #64748b;">© 2026 TechStore - Compra 100% Segura</p>
        </div>
    </footer>

    <script>
        function renderCart() {
            const container = document.getElementById('cart-container');
            const summary = document.getElementById('cart-summary');
            const totalEl = document.getElementById('cart-total');
            let cart = JSON.parse(localStorage.getItem('techstore_cart')) || [];

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart-container">
                        <div class="icon">🛒</div>
                        <h3>Seu carrinho está vazio</h3>
                        <p style="color: #64748b; margin: 1rem 0 2rem;">Adicione alguns produtos incríveis para começar.</p>
                        <a href="produtos.html" class="btn-checkout" style="text-decoration: none; display: inline-block;">Ver Produtos</a>
                    </div>
                `;
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                html += `
                <div class="cart-item-card">
                    <div class="cart-item-img">📦</div>
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p class="price">R$ ${item.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                    </div>
                    <button class="btn-remove" onclick="removeItem(${index})">Remover</button>
                </div>`;
                total += item.price;
            });
            
            container.innerHTML = html;
            totalEl.innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('techstore_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('techstore_cart', JSON.stringify(cart));
            renderCart();
        }

        function clearCart() {
            localStorage.removeItem('techstore_cart');
            renderCart();
        }

        function checkout() {
            let cart = JSON.parse(localStorage.getItem('techstore_cart')) || [];
            if (cart.length === 0) return alert("Seu carrinho está vazio!");

            let total = cart.reduce((acc, item) => acc + item.price, 0);
            let sales = JSON.parse(localStorage.getItem('techstore_sales')) || [];
            
            // Registra a venda
            sales.unshift({
                id: "#" + Math.floor(Math.random() * 9000 + 1000),
                items: cart.length,
                total: total,
                date: new Date().toLocaleDateString('pt-BR')
            });

            localStorage.setItem('techstore_sales', JSON.stringify(sales));
            localStorage.removeItem('techstore_cart');
            
            alert("✅ Compra de R$ " + total.toLocaleString('pt-BR') + " realizada com sucesso!");
            renderCart();
        }

        window.onload = renderCart;
    </script>
</body>
</html>
