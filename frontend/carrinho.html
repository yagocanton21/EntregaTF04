<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Carrinho | TechStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display: block;">
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">Tech<span>Store</span></div>
            <nav><ul><li><a href="index.html">Home</a></li><li><a href="produtos.html">Produtos</a></li></ul></nav>
        </div>
    </header>

    <main class="container" style="margin-top: 5rem; padding-bottom: 5rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 2rem; text-align: center;">🛒 Seu Carrinho</h1>
        
        <!-- Container dos Cards do Carrinho -->
        <div id="cart-container" class="product-grid">
            <!-- Os cards serão gerados via JS -->
            <p id="empty-msg" style="color: #64748b; text-align: center; width: 100%;">Carregando seu carrinho...</p>
        </div>

        <div id="cart-summary" style="margin-top: 4rem; text-align: center; display: none; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
            <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">Total do Pedido: <span id="cart-total" style="color: #2563eb;">R$ 0,00</span></h2>
            <div style="display: flex; justify-content: center; gap: 1rem;">
                <button class="btn-primary" onclick="checkout()" style="border: none; cursor: pointer; padding: 1rem 3rem;">Finalizar Compra</button>
                <button onclick="clearCart()" style="background: #ef4444; color: white; border: none; padding: 1rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 700;">Esvaziar Carrinho</button>
            </div>
        </div>
    </main>

    <footer style="padding: 2rem 0; background: white; border-top: 1px solid #e2e8f0; text-align: center;">
        <p>© 2026 TechStore - Compra Segura</p>
    </footer>

    <script>
        function renderCart() {
            const container = document.getElementById('cart-container');
            const summary = document.getElementById('cart-summary');
            const totalEl = document.getElementById('cart-total');
            let cart = JSON.parse(localStorage.getItem('techstore_cart')) || [];

            if (cart.length === 0) {
                container.innerHTML = '<div style="background: white; padding: 3rem; border-radius: 12px; grid-column: 1/-1; text-align: center;"><p style="color: #64748b;">Seu carrinho está vazio.</p></div>';
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                html += `
                <div class="product-card">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">📦</div>
                    <h3>${item.name}</h3>
                    <p class="price">R$ ${item.price.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                    <button onclick="removeItem(${index})" style="background: none; border: 1px solid #ff0000; color: #ff0000; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600;">Remover</button>
                </div>`;
                total += item.price;
            });
            
            container.innerHTML = html;
            totalEl.innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('techstore_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('techstore_cart', JSON.stringify(cart));
            renderCart();
        }

        function clearCart() {
            localStorage.removeItem('techstore_cart');
            renderCart();
        }

        function checkout() {
            let cart = JSON.parse(localStorage.getItem('techstore_cart')) || [];
            if (cart.length === 0) return alert("Seu carrinho está vazio!");

            let total = cart.reduce((acc, item) => acc + item.price, 0);
            let sales = JSON.parse(localStorage.getItem('techstore_sales')) || [];
            
            // Registra a venda
            sales.unshift({
                id: "#" + Math.floor(Math.random() * 9000 + 1000),
                items: cart.length,
                total: total,
                date: new Date().toLocaleDateString('pt-BR')
            });

            localStorage.setItem('techstore_sales', JSON.stringify(sales));
            localStorage.removeItem('techstore_cart');
            
            alert("✅ Compra de R$ " + total.toLocaleString('pt-BR') + " realizada com sucesso!");
            renderCart();
        }

        window.onload = renderCart;
    </script>
</body>
</html>
