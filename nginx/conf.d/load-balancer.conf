limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

upstream api_servers {
    least_conn;
    server backend1:80;
    server backend2:80;
    server backend3:80;
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    access_log /var/log/nginx/access.log json_analytics;

    location / {
        auth_basic off;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        auth_basic off;
        limit_req zone=mylimit burst=20 nodelay;
        proxy_pass http://api_servers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }

    # Rotas de monitoramento individual (para o Dashboard Admin)
    location /api/node1/ { auth_basic off; proxy_pass http://backend1:80/; }
    location /api/node2/ { auth_basic off; proxy_pass http://backend2:80/; }
    location /api/node3/ { auth_basic off; proxy_pass http://backend3:80/; }

    location /admin/ {
        auth_basic off;
        proxy_pass http://admin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Endpoint de métricas padrão do Nginx
    location /nginx-status {
        auth_basic off;
        stub_status;
        allow all;
    }

    # Endpoint de status personalizado (JSON) para cumprir requisito de monitoramento
    location /status {
        default_type application/json;
        return 200 '{"status":"up","services":{"load_balancer":"online","cluster":"active"}}';
    }

    location = /health {
        auth_basic off;
        default_type text/plain;
        return 200 'healthy\n';
        allow all;
    }
}
